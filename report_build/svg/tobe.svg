<svg viewBox="0 0 820 720" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="820" height="720" fill="#ffffff"/>
  <style>
    .term { fill:#dcfce7; stroke:#15803d; stroke-width:1.5; }
    .proc { fill:#f8fafc; stroke:#475569; stroke-width:1.5; }
    .sys  { fill:#e0ecfb; stroke:#1d4ed8; stroke-width:1.5; }
    .dec  { fill:#fef9e7; stroke:#b45309; stroke-width:1.5; }
    .t { fill:#0f172a; font-size:12px; text-anchor:middle; }
    .lane { fill:#64748b; font-size:12px; font-weight:700; text-anchor:middle; }
    .fl { stroke:#475569; stroke-width:1.4; fill:none; }
    .yes { fill:#15803d; font-size:11px; font-weight:700; }
    .no { fill:#b91c1c; font-size:11px; font-weight:700; }
    .title { fill:#0f172a; font-size:16px; font-weight:700; text-anchor:middle; }
    .gridln { stroke:#cbd5e1; stroke-width:1; stroke-dasharray:4 4; }
  </style>
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7.5" refY="3" orient="auto">
      <path d="M0,0 L7.5,3 L0,6" fill="none" stroke="#475569" stroke-width="1.3"/>
    </marker>
  </defs>

  <text class="title" x="410" y="28">TO-BE Process — Automated CBAM Calculation (swimlane)</text>

  <!-- swimlane separators -->
  <line class="gridln" x1="280" y1="50" x2="280" y2="690"/>
  <line class="gridln" x1="560" y1="50" x2="560" y2="690"/>
  <text class="lane" x="150" y="70">User</text>
  <text class="lane" x="420" y="70">CarbonConsulting System</text>
  <text class="lane" x="690" y="70">Data Sources</text>

  <!-- Start (user) -->
  <rect class="term" x="55" y="90" width="190" height="38" rx="19"/>
  <text class="t" x="150" y="114">Start: open calculator</text>
  <path class="fl" marker-end="url(#a)" d="M150,128 L150,150"/>

  <!-- user: select sector -->
  <rect class="proc" x="55" y="150" width="190" height="44"/>
  <text class="t" x="150" y="170">Select sector</text>
  <text class="t" x="150" y="186">(5 CBAM sectors)</text>
  <path class="fl" marker-end="url(#a)" d="M150,194 L150,216"/>

  <!-- user: enter data -->
  <rect class="proc" x="55" y="216" width="190" height="44"/>
  <text class="t" x="150" y="236">Enter production data</text>
  <text class="t" x="150" y="252">+ EU export ratio</text>
  <path class="fl" marker-end="url(#a)" d="M245,238 L335,238"/>

  <!-- system: fetch factors (calls data source) -->
  <rect class="sys" x="335" y="216" width="190" height="44"/>
  <text class="t" x="430" y="236">Load emission factor</text>
  <text class="t" x="430" y="252">+ live prices</text>
  <path class="fl" marker-end="url(#a)" d="M525,238 L615,238"/>
  <path class="fl" marker-end="url(#a)" d="M615,262 L525,262" opacity="0"/>

  <!-- data source -->
  <rect class="proc" x="615" y="216" width="160" height="44"/>
  <text class="t" x="695" y="236">Supabase prices /</text>
  <text class="t" x="695" y="252">standard factors</text>
  <path class="fl" marker-end="url(#a)" d="M695,260 L695,300 L430,300 L430,282"/>

  <!-- system: compute emission -->
  <rect class="sys" x="335" y="282" width="190" height="44"/>
  <text class="t" x="430" y="302">Compute Scope 1+2</text>
  <text class="t" x="430" y="318">emission (tCO2e)</text>
  <path class="fl" marker-end="url(#a)" d="M430,326 L430,348"/>

  <!-- system: compute cert need -->
  <rect class="sys" x="335" y="348" width="190" height="44"/>
  <text class="t" x="430" y="368">Compute certificate need</text>
  <text class="t" x="430" y="384">(× EU export ratio)</text>
  <path class="fl" marker-end="url(#a)" d="M430,392 L430,414"/>

  <!-- system: cost scenarios -->
  <rect class="sys" x="335" y="414" width="190" height="44"/>
  <text class="t" x="430" y="434">Build 2 cost scenarios</text>
  <text class="t" x="430" y="450">(EUA · CBAM+VCM)</text>
  <path class="fl" marker-end="url(#a)" d="M430,458 L430,480"/>

  <!-- decision: export? -->
  <polygon class="dec" points="430,480 530,520 430,560 330,520"/>
  <text class="t" x="430" y="524">Export report?</text>

  <!-- No -> back to user view (left) -->
  <path class="fl" marker-end="url(#a)" d="M330,520 L150,520 L150,300 L245,300 L245,238" opacity="0"/>
  <path class="fl" marker-end="url(#a)" d="M330,520 L150,520 L150,610"/>
  <text class="no" x="240" y="512">No</text>

  <!-- user: view on screen -->
  <rect class="proc" x="55" y="610" width="190" height="44"/>
  <text class="t" x="150" y="630">View result on screen</text>
  <text class="t" x="150" y="646">(emission, cost)</text>

  <!-- Yes down -->
  <path class="fl" marker-end="url(#a)" d="M430,560 L430,582"/>
  <text class="yes" x="442" y="576">Yes</text>

  <!-- system: generate report -->
  <rect class="sys" x="335" y="582" width="190" height="44"/>
  <text class="t" x="430" y="602">Generate compliance</text>
  <text class="t" x="430" y="618">report (CBAM template)</text>
  <path class="fl" marker-end="url(#a)" d="M430,626 L430,648"/>

  <!-- End -->
  <rect class="term" x="335" y="648" width="190" height="38" rx="19"/>
  <text class="t" x="430" y="672">End: report ready</text>
</svg>
