<svg viewBox="0 0 980 700" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="980" height="700" fill="#ffffff"/>
  <style>
    .ehdr { fill:#1e293b; stroke:#0f172a; stroke-width:1.4; }
    .ehlbl { fill:#ffffff; font-size:12.5px; font-weight:700; text-anchor:middle; }
    .ebody { fill:#f8fafc; stroke:#475569; stroke-width:1.4; }
    .attr { fill:#0f172a; font-size:10.5px; text-anchor:start; }
    .key { fill:#1d4ed8; font-size:9.5px; font-weight:700; text-anchor:start; }
    .rel { stroke:#475569; stroke-width:1.4; fill:none; }
    .reld { stroke:#94a3b8; stroke-width:1.3; stroke-dasharray:5 4; fill:none; }
    .card { fill:#b45309; font-size:11px; font-weight:700; text-anchor:middle; }
    .relname { fill:#64748b; font-size:10px; font-style:italic; text-anchor:middle; }
    .title { fill:#0f172a; font-size:16px; font-weight:700; text-anchor:middle; }
  </style>

  <text class="title" x="490" y="28">Entity-Relationship Diagram — CarbonConsulting Database</text>

  <!-- ===== SECTOR ===== -->
  <g>
    <rect class="ehdr" x="60" y="60" width="200" height="26"/>
    <text class="ehlbl" x="160" y="78">SECTOR</text>
    <rect class="ebody" x="60" y="86" width="200" height="74"/>
    <text class="key"  x="70" y="104">PK</text><text class="attr" x="95" y="104">sector_id</text>
    <text class="attr" x="70" y="122">name</text>
    <text class="attr" x="70" y="140">standard</text>
    <text class="attr" x="70" y="156">description</text>
  </g>

  <!-- ===== EMISSION_FACTOR ===== -->
  <g>
    <rect class="ehdr" x="60" y="430" width="200" height="26"/>
    <text class="ehlbl" x="160" y="448">EMISSION_FACTOR</text>
    <rect class="ebody" x="60" y="456" width="200" height="92"/>
    <text class="key"  x="70" y="474">PK</text><text class="attr" x="95" y="474">factor_id</text>
    <text class="key"  x="70" y="492">FK</text><text class="attr" x="95" y="492">sector_id</text>
    <text class="attr" x="70" y="510">route_type</text>
    <text class="attr" x="70" y="528">value</text>
    <text class="attr" x="70" y="544">unit</text>
  </g>

  <!-- ===== COMPANY ===== -->
  <g>
    <rect class="ehdr" x="390" y="60" width="200" height="26"/>
    <text class="ehlbl" x="490" y="78">COMPANY</text>
    <rect class="ebody" x="390" y="86" width="200" height="92"/>
    <text class="key"  x="400" y="104">PK</text><text class="attr" x="425" y="104">company_id</text>
    <text class="key"  x="400" y="122">FK</text><text class="attr" x="425" y="122">sector_id</text>
    <text class="attr" x="400" y="140">name</text>
    <text class="attr" x="400" y="158">country</text>
    <text class="attr" x="400" y="174">export_ratio</text>
  </g>

  <!-- ===== USER ===== -->
  <g>
    <rect class="ehdr" x="390" y="470" width="200" height="26"/>
    <text class="ehlbl" x="490" y="488">USER</text>
    <rect class="ebody" x="390" y="496" width="200" height="74"/>
    <text class="key"  x="400" y="514">PK</text><text class="attr" x="425" y="514">user_id</text>
    <text class="key"  x="400" y="532">FK</text><text class="attr" x="425" y="532">company_id</text>
    <text class="attr" x="400" y="550">role</text>
    <text class="attr" x="400" y="566">email</text>
  </g>

  <!-- ===== CALCULATION ===== -->
  <g>
    <rect class="ehdr" x="720" y="180" width="220" height="26"/>
    <text class="ehlbl" x="830" y="198">CALCULATION</text>
    <rect class="ebody" x="720" y="206" width="220" height="146"/>
    <text class="key"  x="730" y="224">PK</text><text class="attr" x="755" y="224">calc_id</text>
    <text class="key"  x="730" y="242">FK</text><text class="attr" x="755" y="242">company_id</text>
    <text class="key"  x="730" y="260">FK</text><text class="attr" x="755" y="260">sector_id</text>
    <text class="attr" x="730" y="278">production_amount</text>
    <text class="attr" x="730" y="296">emission_total</text>
    <text class="attr" x="730" y="314">certificate_need</text>
    <text class="attr" x="730" y="332">cost_eua</text>
    <text class="attr" x="730" y="348">created_at</text>
  </g>

  <!-- ===== CERTIFICATE_PRICE ===== -->
  <g>
    <rect class="ehdr" x="720" y="470" width="220" height="26"/>
    <text class="ehlbl" x="830" y="488">CERTIFICATE_PRICE</text>
    <rect class="ebody" x="720" y="496" width="220" height="110"/>
    <text class="key"  x="730" y="514">PK</text><text class="attr" x="755" y="514">cert_id</text>
    <text class="attr" x="730" y="532">name</text>
    <text class="attr" x="730" y="550">price</text>
    <text class="attr" x="730" y="568">currency</text>
    <text class="attr" x="730" y="586">change_pct</text>
    <text class="attr" x="730" y="602">updated_at</text>
  </g>

  <!-- ===== Relationships ===== -->
  <!-- SECTOR 1 - N EMISSION_FACTOR -->
  <path class="rel" d="M160,160 L160,430"/>
  <text class="card" x="172" y="180">1</text>
  <text class="card" x="172" y="420">N</text>
  <text class="relname" x="120" y="300">defines</text>

  <!-- SECTOR 1 - N COMPANY -->
  <path class="rel" d="M260,120 L390,120"/>
  <text class="card" x="278" y="113">1</text>
  <text class="card" x="372" y="113">N</text>
  <text class="relname" x="325" y="138">classifies</text>

  <!-- COMPANY 1 - N USER -->
  <path class="rel" d="M490,178 L490,470"/>
  <text class="card" x="502" y="198">1</text>
  <text class="card" x="502" y="462">N</text>
  <text class="relname" x="455" y="330">employs</text>

  <!-- COMPANY 1 - N CALCULATION -->
  <path class="rel" d="M590,140 L660,140 L660,250 L720,250"/>
  <text class="card" x="608" y="133">1</text>
  <text class="card" x="708" y="243">N</text>
  <text class="relname" x="662" y="200">runs</text>

  <!-- SECTOR -> CALCULATION (FK, light) routed above COMPANY -->
  <path class="reld" d="M200,60 L200,44 L905,44 L905,180"/>
  <text class="card" x="212" y="40">1</text>
  <text class="card" x="890" y="174">N</text>

  <!-- CERTIFICATE_PRICE ... CALCULATION (price snapshot) -->
  <path class="reld" d="M830,470 L830,352"/>
  <text class="relname" x="892" y="415">price snapshot</text>
</svg>
